<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chalet Spinale | Menu</title>
<style>
  :root {
    --bg: #161616;
    --grey: #383838;
    --text: #f0f0f0;
    --muted: #a3a3a3;
    --line: #3d3d3d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { max-width: 480px; margin: 0 auto; padding-bottom: 60px; }

  .lang-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    background: #101010;
    padding: 10px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .lang-bar button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .lang-bar button.active {
    background: var(--text);
    color: #161616;
    border-color: var(--text);
  }

  header { background: var(--grey); text-align: center; padding: 26px 20px 18px; }
  header img { width: 140px; margin-bottom: 6px; }

  .menu-title {
    text-align: center;
    padding: 18px 0 10px;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: bold;
    letter-spacing: 4px;
    font-size: 22px;
  }
  .menu-title-line { width: 60px; height: 1px; background: var(--muted); margin: 0 auto 14px; }

  nav.categories {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 4px 16px 16px;
    scrollbar-width: none;
  }
  nav.categories::-webkit-scrollbar { display: none; }
  nav.categories a {
    flex: none;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 20px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  section.category { padding: 10px 20px 6px; }
  section.category h2 {
    font-family: Georgia, serif;
    font-size: 17px;
    letter-spacing: 1.5px;
    color: var(--text);
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .dish {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed #2a2a2a;
  }
  .dish:last-child { border-bottom: none; }
  .dish-info { flex: 1; }
  .dish-name { font-size: 14.5px; font-weight: 600; color: var(--text); }
  .dish-desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .dish-price { font-size: 14px; font-weight: bold; color: var(--text); white-space: nowrap; }
  .allergen { font-size: 10px; color: #7a7a7a; margin-top: 2px; }

  footer { margin-top: 28px; text-align: center; padding: 22px 20px; background: #101010; }
  .footer-line { width: 55px; height: 1px; background: var(--line); margin: 0 auto 16px; }
  .nfc-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
  .nfc-wrap svg { width: 22px; height: 22px; }
  .brand { font-weight: bold; font-size: 15px; color: var(--text); letter-spacing: 0.5px; }
  .tagline { font-size: 10.5px; color: var(--muted); margin-top: 3px; letter-spacing: 0.3px; }
</style>
</head>

let currentLang = "it";

function render() {
  const langBar = document.getElementById("langBar");
  langBar.innerHTML = "";
  LANGS.forEach(l => {
    const btn = document.createElement("button");
    btn.textContent = LANG_LABELS[l];
    if (l === currentLang) btn.classList.add("active");
    btn.onclick = () => { currentLang = l; render(); };
    langBar.appendChild(btn);
  });

  document.getElementById("tagline").textContent = T.tagline[currentLang];

  const catNav = document.getElementById("catNav");
  catNav.innerHTML = "";
  T.categories.forEach(c => {
    const a = document.createElement("a");
    a.href = "#" + c.id;
    a.textContent = c.name[currentLang];
    catNav.appendChild(a);
  });

  const content = document.getElementById("menuContent");
  content.innerHTML = "";
  T.categories.forEach(c => {
    const section = document.createElement("section");
    section.className = "category";
    section.id = c.id;
    const h2 = document.createElement("h2");
    h2.textContent = c.name[currentLang];
    section.appendChild(h2);

    T.dishes[c.id].forEach(d => {
      const div = document.createElement("div");
      div.className = "dish";
      const info = document.createElement("div");
      info.className = "dish-info";
      const nameEl = document.createElement("div");
      nameEl.className = "dish-name";
      nameEl.textContent = d.name[currentLang];
      info.appendChild(nameEl);
      if (d.desc && d.desc[currentLang]) {
        const descEl = document.createElement("div");
        descEl.className = "dish-desc";
        descEl.textContent = d.desc[currentLang];
        info.appendChild(descEl);
      }
      if (d.allergen && d.allergen[currentLang]) {
        const allEl = document.createElement("div");
        allEl.className = "allergen";
        allEl.textContent = T.allergenLabel[currentLang] + ": " + d.allergen[currentLang];
        info.appendChild(allEl);
      }
      const priceEl = document.createElement("div");
      priceEl.className = "dish-price";
      priceEl.textContent = d.price;
      div.appendChild(info);
      div.appendChild(priceEl);
      section.appendChild(div);
    });

    content.appendChild(section);
  });
}

render();
</script>
