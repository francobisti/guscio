  .wrap{width:100%;max-width:480px;}

  .mark{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .mark-icon{width:34px;height:34px;border-radius:50%;background:var(--malt);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .mark-icon svg{width:18px;height:18px;}
  .mark-text{font-family:Georgia,serif;font-size:22px;font-weight:700;letter-spacing:0.5px;color:var(--malt);}

  .tagline{font-size:13px;color:#7A6A52;font-style:italic;margin-bottom:28px;padding-left:44px;}

  .lang-row{display:flex;gap:6px;margin-bottom:26px;flex-wrap:wrap;}
  .lang-btn{
    flex:1 1 18%;min-width:52px;padding:9px 4px;border:1.5px solid var(--line);border-radius:8px;
    background:var(--foam);color:var(--ink);font-family:Georgia,serif;font-size:13px;font-weight:600;
    cursor:pointer;transition:all .2s;text-align:center;
  }
  .lang-btn.active{background:var(--malt);color:var(--foam);border-color:var(--malt);}

  [dir="rtl"] .item-price{float:left;}
  [dir="rtl"] .footer-note,[dir="rtl"] .tagline{direction:rtl;}

  .section-title{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--amber);
    font-family:Helvetica,Arial,sans-serif;font-weight:700;margin-bottom:6px;
  }
  .table-name{font-size:28px;font-weight:700;color:var(--malt);margin-bottom:24px;line-height:1.15;}

  .play-card{
    background:var(--foam);border:1.5px solid var(--line);border-radius:16px;padding:22px;
    margin-bottom:18px;
  }
  .play-btn{
    width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    background:var(--malt);color:var(--foam);border:none;border-radius:30px;
    padding:16px;font-family:Helvetica,Arial,sans-serif;font-size:15px;font-weight:600;
    cursor:pointer;letter-spacing:0.3px;transition:opacity .2s;
  }
  .play-btn:active{opacity:0.8;}
  .play-btn.speaking{background:var(--amber);}
  .play-btn svg{width:18px;height:18px;flex-shrink:0;}

  .item{
    border-bottom:1px solid var(--line);padding:14px 0;
  }
  .item:last-child{border-bottom:none;}
  .item-name{font-size:16px;font-weight:700;color:var(--ink);}
  .item-desc{font-size:13.5px;color:#6B5B43;font-style:italic;margin-top:2px;}
  .item-price{font-size:13px;color:var(--amber);font-weight:700;float:right;}

  .footer-note{
    text-align:center;font-size:11.5px;color:#9A8A6E;margin-top:30px;line-height:1.6;
    font-family:Helvetica,Arial,sans-serif;

  .footer-note a{color:var(--amber);text-decoration:none;}
</style>

const LANG_NAMES = { it:"IT", en:"EN", de:"DE", fr:"FR", pl:"PL", cs:"CZ", zh:"中文", ja:"日本語", ar:"عربي" };
const VOICE_LOCALE = { it:"it-IT", en:"en-US", de:"de-DE", fr:"fr-FR", pl:"pl-PL", cs:"cs-CZ", zh:"zh-CN", ja:"ja-JP", ar:"ar-SA" };
const TAGLINE = { it:"il menu che si racconta", en:"the menu that tells its story", de:"die Speisekarte, die sich erzählt", fr:"le menu qui se raconte", pl:"menu, które się rozmawia", cs:"menu, které vypráví", zh:"会说话的菜单", ja:"語りかけるメニュー", ar:"القائمة التي تتحدث" };
const PLAY_LABEL = { it:"Ascolta", en:"Listen", de:"Anhören", fr:"Écouter", pl:"Słuchaj", cs:"Poslechnout", zh:"收听", ja:"聞く", ar:"استمع" };
const STOP_LABEL = { it:"Interrompi", en:"Stop", de:"Stoppen", fr:"Arrêter", pl:"Zatrzymaj", cs:"Zastavit", zh:"停止", ja:"停止", ar:"إيقاف" };
const RTL_LANGS = ["ar"];

// Determine which section this tag/table points to via ?table= param (1-4), default 1
const params = new URLSearchParams(window.location.search);
const tableMap = { "1":"antipasti", "2":"pizze", "3":"burger", "4":"birre" };
let currentSection = tableMap[params.get('table')] || "antipasti";
let currentLang = "it";
let utterance = null;

function render(){
  document.documentElement.dir = RTL_LANGS.includes(currentLang) ? 'rtl' : 'ltr';
  const sec = SECTIONS[currentSection];
  document.getElementById('sectionLabel').textContent = sec.label[currentLang];
  document.getElementById('tableName').textContent = sec.title[currentLang];
  document.getElementById('tagline').textContent = TAGLINE[currentLang];
  document.getElementById('playLabel').textContent = PLAY_LABEL[currentLang];

  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  sec.items.forEach(item => {
    const data = item[currentLang];
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<span class="item-price">€ ${data[2]}</span>
                      <div class="item-name">${data[0]}</div>
                      <div class="item-desc">${data[1]}</div>`;
    list.appendChild(div);
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    stopSpeaking();
    render();
  });
});

function stopSpeaking(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  const btn = document.getElementById('playBtn');
  btn.classList.remove('speaking');
  document.getElementById('playLabel').textContent = PLAY_LABEL[currentLang];
}

document.getElementById('playBtn').addEventListener('click', () => {
  const btn = document.getElementById('playBtn');
  if(btn.classList.contains('speaking')){
    stopSpeaking();
    return;
  }
  if(!window.speechSynthesis){
    alert('Sintesi vocale non disponibile su questo browser.');
    return;
  }
  window.speechSynthesis.cancel();
  const sec = SECTIONS[currentSection];
  utterance = new SpeechSynthesisUtterance(sec.voice[currentLang]);
  utterance.lang = VOICE_LOCALE[currentLang];
  utterance.rate = 0.98;
  utterance.onend = stopSpeaking;
  utterance.onerror = stopSpeaking;
  btn.classList.add('speaking');
  document.getElementById('playLabel').textContent = STOP_LABEL[currentLang];
  window.speechSynthesis.speak(utterance);
});

render();
</script>
