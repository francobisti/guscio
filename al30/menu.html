<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>al30 Osteria & Friends | Menu</title>
<style>
  :root {
    --bg: #fdf8f3;
    --plaid-red: #d97b6c;
    --dark: #2e2b25;
    --olive: #4a4a3a;
    --copper: #b5652f;
    --muted: #8a8378;
    --line: #e3d9cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { max-width: 480px; margin: 0 auto; padding-bottom: 60px; }

  .lang-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    background: var(--dark);
    padding: 10px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .lang-bar button {
    background: transparent;
    border: 1px solid #6a6a5c;
    color: #cfc9bd;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .lang-bar button.active {
    background: var(--plaid-red);
    color: #fff;
    border-color: var(--plaid-red);
  }

  .listen-bar {
    display: flex;
    justify-content: center;
    padding: 10px 12px 12px;
    background: var(--dark);
  }
  .listen-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid #6a6a5c;
    color: #f2ede4;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 7px 16px;
    border-radius: 18px;
    cursor: pointer;
  }
  .listen-btn.speaking { background: var(--plaid-red); color: #fff; border-color: var(--plaid-red); }
  .listen-btn svg { width: 15px; height: 15px; }

  header { text-align: center; }
  header img { width: 100%; display: block; }

  .menu-title {
    text-align: center;
    padding: 20px 0 8px;
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
    font-weight: normal;
    font-size: 40px;
    color: var(--olive);
  }
  .menu-title-line { width: 60px; height: 2px; background: var(--plaid-red); margin: 0 auto 16px; }

  nav.categories {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 4px 16px 16px;
    scrollbar-width: none;
  }
  nav.categories::-webkit-scrollbar { display: none; }
  nav.categories a {
    flex: none;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 20px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.5px;
    white-space: nowrap;
    background: #fff;
  }

  section.category { padding: 10px 20px 6px; }
  section.category h2 {
    font-family: Georgia, serif;
    font-size: 17px;
    letter-spacing: 1px;
    color: var(--copper);
    border-bottom: 2px solid var(--line);
    padding-bottom: 8px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .dish {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px dashed #e6ddd0;
  }
  .dish:last-child { border-bottom: none; }
  .dish-info { flex: 1; }
  .dish-name { font-size: 14.5px; font-weight: 600; color: var(--dark); }
  .dish-desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .dish-price { font-size: 14px; font-weight: bold; color: var(--copper); white-space: nowrap; }
  .allergen { font-size: 10px; color: #a89f8f; margin-top: 2px; }

  .dish-listen {
    background: transparent;
    border: none;
    color: #b8ac98;
    cursor: pointer;
    padding: 2px 4px;
    flex: none;
  }
  .dish-listen svg { width: 15px; height: 15px; display: block; }
  .dish-listen.speaking { color: var(--plaid-red); }

  footer {
    margin-top: 28px;
    text-align: center;
    padding: 22px 20px;
    background: var(--dark);
  }
  .footer-line { width: 55px; height: 1px; background: #5a5a4c; margin: 0 auto 16px; }
  .nfc-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
  .nfc-wrap svg { width: 22px; height: 22px; }
  .brand { font-weight: bold; font-size: 15px; color: #f2ede4; letter-spacing: 0.5px; }
  .tagline { font-size: 10.5px; color: #a39c8d; margin-top: 3px; letter-spacing: 0.3px; }
</style>
</head>

function detectDeviceLang() {
  const supported = ["it","en","de","nl","pl","cs"];
  const raw = (navigator.languages && navigator.languages.length)
    ? navigator.languages
    : [navigator.language || navigator.userLanguage || "it"];
  for (const l of raw) {
    const code = l.toLowerCase().slice(0,2);
    if (supported.includes(code)) return code;
  }
  return "en";
}

let currentLang = detectDeviceLang();

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.querySelectorAll(".dish-listen.speaking").forEach(b => b.classList.remove("speaking"));
  const allBtn = document.getElementById("listenAllBtn");
  if (allBtn) allBtn.classList.remove("speaking");
  const label = document.getElementById("listenAllLabel");
  if (label) label.textContent = T.listenAll[currentLang];
}

function speakText(text, lang, onEnd) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = SPEECH_LANG[lang] || "it-IT";
  utter.rate = 0.95;
  if (onEnd) utter.onend = onEnd;
  window.speechSynthesis.speak(utter);
}

function speakDish(d, btnEl) {
  const wasSpeaking = btnEl.classList.contains("speaking");
  stopSpeaking();
  if (wasSpeaking) return;
  let text = d.name[currentLang];
  if (d.desc && d.desc[currentLang]) text += ". " + d.desc[currentLang];
  if (d.allergen && d.allergen[currentLang]) text += ". " + T.allergenLabel[currentLang] + ": " + d.allergen[currentLang];
  const priceNum = (d.price.match(/[\d,.]+/) || [""])[0];
  text += ". " + priceNum + " " + T.currencyWord[currentLang];
  btnEl.classList.add("speaking");
  speakText(text, currentLang, () => btnEl.classList.remove("speaking"));
}

function speakAllMenu() {
  const allBtn = document.getElementById("listenAllBtn");
  const label = document.getElementById("listenAllLabel");
  const wasSpeaking = allBtn.classList.contains("speaking");
  stopSpeaking();
  if (wasSpeaking) return;
  let parts = [];
  T.categories.forEach(c => {
    parts.push(c.name[currentLang] + ".");
    T.dishes[c.id].forEach(d => {
      let t = d.name[currentLang];
      if (d.desc && d.desc[currentLang]) t += ", " + d.desc[currentLang];
      const priceNum = (d.price.match(/[\d,.]+/) || [""])[0];
      t += ", " + priceNum + " " + T.currencyWord[currentLang] + ".";
      parts.push(t);
    });
  });
  const fullText = parts.join(" ");
  allBtn.classList.add("speaking");
  label.textContent = T.stop[currentLang];
  speakText(fullText, currentLang, () => {
    allBtn.classList.remove("speaking");
    label.textContent = T.listenAll[currentLang];
  });
}

function render() {
  stopSpeaking();
  const langBar = document.getElementById("langBar");
  langBar.innerHTML = "";
  LANGS.forEach(l => {
    const btn = document.createElement("button");
    btn.textContent = LANG_LABELS[l];
    if (l === currentLang) btn.classList.add("active");
    btn.onclick = () => { currentLang = l; render(); };
    langBar.appendChild(btn);
  });

  document.getElementById("tagline").textContent = T.tagline[currentLang];
  document.getElementById("listenAllLabel").textContent = T.listenAll[currentLang];

  const catNav = document.getElementById("catNav");
  catNav.innerHTML = "";
  T.categories.forEach(c => {
    const a = document.createElement("a");
    a.href = "#" + c.id;
    a.textContent = c.name[currentLang];
    catNav.appendChild(a);
  });

  const content = document.getElementById("menuContent");
  content.innerHTML = "";
  T.categories.forEach(c => {
    const section = document.createElement("section");
    section.className = "category";
    section.id = c.id;
    const h2 = document.createElement("h2");
    h2.textContent = c.name[currentLang];
    section.appendChild(h2);

    T.dishes[c.id].forEach(d => {
      const div = document.createElement("div");
      div.className = "dish";
      const info = document.createElement("div");
      info.className = "dish-info";
      const nameEl = document.createElement("div");
      nameEl.className = "dish-name";
      nameEl.textContent = d.name[currentLang];
      info.appendChild(nameEl);
      if (d.desc && d.desc[currentLang]) {
        const descEl = document.createElement("div");
        descEl.className = "dish-desc";
        descEl.textContent = d.desc[currentLang];
        info.appendChild(descEl);
      }
      if (d.allergen && d.allergen[currentLang]) {
        const allEl = document.createElement("div");
        allEl.className = "allergen";
        allEl.textContent = T.allergenLabel[currentLang] + ": " + d.allergen[currentLang];
        info.appendChild(allEl);
      }
      const priceEl = document.createElement("div");
      priceEl.className = "dish-price";
      priceEl.textContent = d.price;

      const speakBtn = document.createElement("button");
      speakBtn.className = "dish-listen";
      speakBtn.innerHTML = SPEAKER_ICON;
      speakBtn.setAttribute("aria-label", "listen");
      speakBtn.onclick = () => speakDish(d, speakBtn);

      div.appendChild(info);
      div.appendChild(priceEl);
      div.appendChild(speakBtn);
      section.appendChild(div);
    });

    content.appendChild(section);
  });
}

document.getElementById("listenAllBtn").onclick = speakAllMenu;
render();
