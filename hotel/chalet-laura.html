<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chalet Laura · Oliday Instruction Card by GUSCIO</title>
<style>
  :root{
    --dark: #1f4038;
    --accent: #275c4e;
    --gold: #c5a86e;
    --light: #e6eeeb;
    --text: #2a2a2a;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--light);
    color: var(--text);
  }
  header {
    background: var(--dark);
    color: white;
    padding: 28px 20px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content:"";
    position:absolute;
    top:0; left:-10%;
    width:60%; height:100%;
    background: var(--accent);
    transform: skewX(-12deg);
    z-index:0;
  }
  header .brand {
    font-weight:700;
    font-size: 14px;
    letter-spacing: 0.5px;
    opacity:0.9;
    position:relative; z-index:1;
  }
  header h1 {
    font-size: 26px;
    margin: 10px 0 4px;
    position:relative; z-index:1;
  }
  header p.sub {
    margin:0;
    font-style: italic;
    color: var(--gold);
    font-size: 14px;
    position:relative; z-index:1;
  }
  .lang-switch {
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:18px;
    position:relative; z-index:1;
  }
  .lang-switch button {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
  }
  .lang-switch button.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight:700;
  }
  main {
    max-width: 480px;
    margin: -30px auto 40px;
    padding: 0 16px;
    position: relative;
    z-index: 2;
  }
  .card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .card-header {
    display:flex;
    align-items:center;
    gap:12px;
    padding: 16px 18px;
    cursor: pointer;
    user-select:none;
  }
  .card-header .dot {
    width:10px; height:10px;
    border-radius:50%;
    background: var(--accent);
    flex-shrink:0;
  }
  .card-header .title {
    flex:1;
    font-weight:600;
    font-size:15.5px;
  }
  .card-header .icon {
    width:28px; height:28px;
    border-radius:50%;
    background: var(--light);
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--accent);
    font-size:14px;
  }
  .card-body {
    display:none;
    padding: 0 18px 18px 40px;
    font-size: 14.5px;
    line-height: 1.55;
    color: #444;
  }
  .card.open .card-body { display:block; }
  .card.open .card-header .icon { background: var(--accent); color:white; }
  .play-btn {
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:10px;
    background: var(--dark);
    color:white;
    border:none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor:pointer;
  }
  .play-btn:hover { background: var(--accent); }
  footer {
    text-align:center;
    font-size:12px;
    color:#888;
    padding: 10px 0 30px;
  }
  footer .tagline {
    color: var(--accent);
    font-style: italic;
    margin-bottom:6px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">GUSCIO.ai × AlpCover</div>
  <h1>Oliday Instruction Card</h1>
  <p class="sub">Chalet Laura Lodge Hotel · 4★ Superior · Madonna di Campiglio</p>
  <div class="lang-switch">
    <button class="active" data-lang="it">IT</button>
    <button data-lang="en">EN</button>
  </div>
</header>

<main id="content"></main>

<footer>
  <div class="tagline">"La sicurezza è un atto d'amore."</div>
  Demo pilota GUSCIO · contenuti basati su chaletlaura.it
</footer>

<script>
const data = {
  it: [
    { t: "Benvenuto & Check-in", b: "Benvenuti al Chalet Laura, la vostra casa nel cuore di Madonna di Campiglio, nelle Dolomiti di Brenta, patrimonio UNESCO. Qui ogni dettaglio è pensato per il vostro relax: legno antico, marmo di Lasa, granito, un'atmosfera raffinata che profuma di montagna vera. Il check-in è in reception, dove il nostro staff è a vostra disposizione per qualsiasi necessità. Seguiteci con l'hashtag #likeathome." },
    { t: "La Camera", b: "La vostra camera è arredata in stile chalet di montagna con un tocco di design. Trovate un courtesy set 'Pure Alpine' ispirato alla montagna, accappatoi morbidi e pantofole comode. Il Wi-Fi è gratuito in tutta la struttura. Per qualsiasi necessità in camera, contattate la reception al numero interno indicato sul telefono." },
    { t: "Colazione & Ristorante", b: "La colazione è un ricco buffet con menù à la carte, servita ogni mattina. Per cena, il nostro ristorante propone una cucina gourmet di qualità e sostenibilità, perché una vacanza perfetta passa anche dal palato. È disponibile anche un lounge bar per i vostri momenti di relax." },
    { t: "SPA & Benessere (+16)", b: "La nostra SPA, riservata agli adulti, è un'oasi di pace dedicata al benessere di mente e corpo: ampia jacuzzi, bagno turco, sauna, biosauna, doccia emozionale e area relax. È disponibile anche una piccola area fitness con Technogym, e massaggi personalizzati su richiesta. Vi consigliamo di prenotare in reception." },
    { t: "Piste da sci & impianti", b: "Siamo nella zona Belvedere, nel cuore di Madonna di Campiglio: gli impianti di risalita sono a pochi passi e potete tornare in hotel sci ai piedi grazie alla pista che arriva proprio davanti all'albergo. Per lezioni private di sci, abbiamo una collaborazione con la Sport Elite School. Il deposito sci è completamente equipaggiato, a vostra disposizione." },
    { t: "Sentieri & escursioni", b: "In estate, Chalet Laura è il punto di partenza ideale per scoprire i sentieri più suggestivi delle Dolomiti di Brenta. Sono disponibili tour guidati con guide alpine, e potete noleggiare MTB ed e-bike direttamente in hotel. Chiedete in reception per organizzare la vostra escursione." },
    { t: "Servizi generali & info utili", b: "L'hotel garantisce tranquillità e silenzio in tutta la struttura, non fumatori, e senza animali per il benessere degli ospiti allergici. Il parcheggio esterno è disponibile, oltre a un garage pubblico con posto riservato prenotabile a 50 metri. Per qualsiasi emergenza o necessità, la reception è sempre a vostra disposizione al numero +39 0465 441246." },
  ],
  en: [
    { t: "Welcome & Check-in", b: "Welcome to Chalet Laura, your home in the heart of Madonna di Campiglio, in the UNESCO World Heritage Brenta Dolomites. Every detail here is designed for your relaxation — antique wood, Lasa marble, granite, a refined atmosphere with true mountain character. Check-in is at reception, where our staff is happy to help with anything you need. Follow us with the hashtag #likeathome." },
    { t: "Your Room", b: "Your room is furnished in mountain chalet style with a designer touch. You'll find a 'Pure Alpine' courtesy set inspired by the mountains, soft bathrobes and comfy slippers. Free Wi-Fi is available throughout the hotel. For anything you need in your room, just contact reception using the internal phone line." },
    { t: "Breakfast & Restaurant", b: "Breakfast is an extensive buffet with an à la carte menu, served every morning. For dinner, our restaurant offers quality, sustainable gourmet cuisine — because a perfect holiday is also about great food. A lounge bar is also available for your relaxing moments." },
    { t: "SPA & Wellness (+16)", b: "Our adults-only SPA is an oasis of peace dedicated to wellbeing of mind and body: a large jacuzzi, Turkish bath, sauna, biosauna, emotional shower and relaxation area. A small fitness area with Technogym equipment is also available, along with personalised massages on request. We recommend booking at reception." },
    { t: "Ski slopes & lifts", b: "We're located in the Belvedere area, right in the heart of Madonna di Campiglio: the ski lifts are just steps away, and you can ski straight back to the hotel thanks to the slope arriving right at our door. For private ski lessons, we work with the Sport Elite School. A fully-equipped ski room is available for your gear." },
    { t: "Trails & excursions", b: "In summer, Chalet Laura is the ideal starting point to discover the most beautiful trails of the Brenta Dolomites. Guided tours with mountain guides are available, and you can rent MTBs and e-bikes directly at the hotel. Ask at reception to organise your excursion." },
    { t: "General services & info", b: "The hotel guarantees peace and quiet throughout, is non-smoking, and pet-free for the wellbeing of allergy-sufferer guests. Outdoor parking is available, plus a public garage with a pre-bookable reserved space 50 metres away. For any emergency or need, reception is always available at +39 0465 441246." },
  ]
};

let currentLang = "it";

function render(lang) {
  const container = document.getElementById("content");
  container.innerHTML = "";
  data[lang].forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(${i})">
        <div class="dot"></div>
        <div class="title">${item.t}</div>
        <div class="icon">▶</div>
      </div>
      <div class="card-body">
        ${item.b}
        <br>
        <button class="play-btn" onclick="event.stopPropagation(); alert('Demo: qui verrebbe riprodotto l\\'audio registrato per questa sezione.')">🔊 Ascolta l'audio</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(i) {
  const cards = document.querySelectorAll(".card");
  cards[i].classList.toggle("open");
}

document.querySelectorAll(".lang-switch button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-switch button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentLang = btn.dataset.lang;
    render(currentLang);
  });
});

render(currentLang);
</script>

</body>
</html>
