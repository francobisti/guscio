<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chalet Laura · Oliday Instruction Card by GUSCIO</title>
<style>
:root{
--dark: #1f4038;
--accent: #275c4e;
--gold: #c5a86e;
--light: #e6eeeb;
--text: #2a2a2a;
}
* { box-sizing: border-box; }
body {
margin:0;
font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
background: var(--light);
color: var(--text);
}
header {
background: var(--dark);
color: white;
padding: 28px 20px 60px;
text-align: center;
position: relative;
overflow: hidden;
}
header::before {
content:"";
position:absolute;
top:0; left:-10%;
width:60%; height:100%;
background: var(--accent);
transform: skewX(-12deg);
z-index:0;
}
header .brand {
font-weight:700;
font-size: 14px;
letter-spacing: 0.5px;
opacity:0.9;
position:relative; z-index:1;
}
header h1 {
font-size: 26px;
margin: 10px 0 4px;
position:relative; z-index:1;
}
header p.sub {
margin:0;
font-style: italic;
color: var(--gold);
font-size: 14px;
position:relative; z-index:1;
}
.lang-switch {
display:flex;
justify-content:center;
gap:8px;
margin-top:18px;
position:relative; z-index:1;
flex-wrap:wrap;
}
.lang-switch button {
background: rgba(255,255,255,0.12);
border: 1px solid rgba(255,255,255,0.4);
color: white;
padding: 6px 14px;
border-radius: 20px;
font-size: 13px;
cursor: pointer;
}
.lang-switch button.active {
background: var(--gold);
border-color: var(--gold);
color: var(--dark);
font-weight:700;
}
main {
max-width: 480px;
margin: -30px auto 40px;
padding: 0 16px;
position: relative;
z-index: 2;
}
.card {
background: white;
border-radius: 14px;
box-shadow: 0 6px 20px rgba(0,0,0,0.08);
margin-bottom: 14px;
overflow: hidden;
}
.card-header {
display:flex;
align-items:center;
gap:12px;
padding: 16px 18px;
cursor: pointer;
user-select:none;
}
.card-header .dot {
width:10px; height:10px;
border-radius:50%;
background: var(--accent);
flex-shrink:0;
}
.card-header .title {
flex:1;
font-weight:600;
font-size:15.5px;
}
.card-header .icon {
width:28px; height:28px;
border-radius:50%;
background: var(--light);
display:flex;
align-items:center;
justify-content:center;
color: var(--accent);
font-size:14px;
transition: transform 0.2s;
}
.card.open .card-header .icon { transform: rotate(180deg); }
.card-body {
display:none;
padding: 0 18px 18px;
font-size: 14.5px;
line-height: 1.6;
color: #444;
}
.card.open .card-body { display:block; }
.audio-btn {
margin-top:12px;
display:inline-flex;
align-items:center;
gap:6px;
background: var(--accent);
color:white;
border:none;
padding: 8px 16px;
border-radius:20px;
font-size:13px;
cursor:pointer;
}
.audio-btn:active { opacity:0.8; }
footer {
text-align:center;
padding:24px 16px;
font-size:12px;
color:#888;
}
</style>
</head>
<body>
<header>
<div class="brand">GUSCIO.ai × AlpCover</div>
<h1>Oliday Instruction Card</h1>
<p class="sub">Chalet Laura Lodge Hotel &middot; 4★ Superior &middot; Madonna di Campiglio</p>
<div class="lang-switch">
<button onclick="setLang('it')" id="btn-it" class="active">IT</button>
<button onclick="setLang('en')" id="btn-en">EN</button>
<button onclick="setLang('de')" id="btn-de">DE</button>
<button onclick="setLang('pl')" id="btn-pl">PL</button>
</div>
</header>

<main id="main-content"></main>

<footer>Powered by GUSCIO &middot; guscio.ai</footer>

<script>
const AUDIO = {
it: null,
en: null,
de: new Audio('ElevenLabs_2026-06-28T12_41_57_Tiziana - Smart, Balanced and Credible_pvc_sp82_s51_sb46_se48_b_m2 (2).mp3'),
pl: new Audio('ElevenLabs_2026-06-28T12_49_00_Tiziana - Smart, Balanced and Credible_pvc_sp82_s51_sb46_se48_b_m2.mp3')
};

// Preload audio
Object.values(AUDIO).forEach(a => { if(a) { a.preload = 'auto'; a.load(); } });

let currentAudio = null;

function playAudio(lang) {
if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
const a = AUDIO[lang];
if (a) { currentAudio = a; a.play(); }
}

const DATA = {
it: [
{ title: 'Benvenuto & Check-in', body: 'Benvenuti al Chalet Laura, la vostra casa nel cuore di Madonna di Campiglio, nelle Dolomiti di Brenta, patrimonio UNESCO. Qui ogni dettaglio è pensato per il vostro relax: legno antico, marmo di Lasa, granito, un’atmosfera raffinata che profuma di montagna vera. Il check-in è in reception, dove il nostro staff è a vostra disposizione per qualsiasi necessità. Seguiteci con l’hashtag #likeathome.' },
{ title: 'La Camera', body: 'La vostra camera è arredata in stile chalet di montagna con un tocco di design. Trovate un courtesy set ‘Pure Alpine’ ispirato alla montagna, accappatoi morbidi e pantofole comode. Il Wi-Fi è gratuito in tutta la struttura. Per qualsiasi necessità in camera, contattate la reception al numero interno indicato sul telefono.' },
{ title: 'Colazione & Ristorante', body: 'La colazione è un ricco buffet con menù à la carte, servita ogni mattina. Per cena, il nostro ristorante propone una cucina gourmet di qualità e sostenibilità, perché una vacanza perfetta passa anche dal palato. È disponibile anche un lounge bar per i vostri momenti di relax.' },
{ title: 'SPA & Benessere (+16)', body: 'La nostra SPA, riservata agli adulti, è un’oasi di pace dedicata al benessere di mente e corpo: ampia jacuzzi, bagno turco, sauna, biosauna, doccia emozionale e area relax. È disponibile anche una piccola area fitness con Technogym, e massaggi personalizzati su richiesta. Vi consigliamo di prenotare in reception.' },
{ title: 'Piste da sci & impianti', body: 'Siamo nella zona Belvedere, nel cuore di Madonna di Campiglio: gli impianti di risalita sono a pochi passi e potete tornare in hotel sci ai piedi grazie alla pista che arriva proprio davanti all’albergo. Per lezioni private di sci, abbiamo una collaborazione con la Sport Elite School. Il deposito sci è completamente equipaggiato, a vostra disposizione.' },
{ title: 'Sentieri & escursioni', body: 'In estate, Chalet Laura è il punto di partenza ideale per scoprire i sentieri più suggestivi delle Dolomiti di Brenta. Sono disponibili tour guidati con guide alpine, e potete noleggiare MTB ed e-bike direttamente in hotel. Chiedete in reception per organizzare la vostra escursione.' },
{ title: 'Servizi generali & info utili', body: 'L’hotel garantisce tranquillità e silenzio in tutta la struttura, non fumatori, e senza animali per il benessere degli ospiti allergici. Il parcheggio esterno è disponibile, oltre a un garage pubblico con posto riservato prenotabile a 50 metri. Per qualsiasi emergenza o necessità, la reception è sempre a vostra disposizione al numero +39 0465 441246.' }
],
en: [
{ title: 'Welcome & Check-in', body: 'Welcome to Chalet Laura, your home in the heart of Madonna di Campiglio, in the Brenta Dolomites, a UNESCO World Heritage Site. Every detail here has been designed for your relaxation: ancient wood, Lasa marble, granite, a refined atmosphere that smells of real mountains. Check-in is at reception, where our staff is at your disposal for any needs. Follow us with the hashtag #likeathome.' },
{ title: 'Your Room', body: 'Your room is furnished in mountain chalet style with a touch of design. You will find a ‘Pure Alpine’ courtesy set inspired by the mountains, soft bathrobes and comfortable slippers. Wi-Fi is free throughout the property. For any in-room needs, contact reception at the internal number indicated on the phone.' },
{ title: 'Breakfast & Restaurant', body: 'Breakfast is a rich buffet with an à la carte menu, served every morning. For dinner, our restaurant offers gourmet cuisine of quality and sustainability, because a perfect holiday also goes through the palate. A lounge bar is also available for your moments of relaxation.' },
{ title: 'SPA & Wellness (+16)', body: 'Our SPA, reserved for adults, is an oasis of peace dedicated to the well-being of mind and body: large jacuzzi, steam room, sauna, biosaunaA, emotional shower and relaxation area. A small fitness area with Technogym and personalised massages on request are also available. We recommend booking at reception.' },
{ title: 'Ski slopes & lifts', body: 'We are in the Belvedere area, in the heart of Madonna di Campiglio: the ski lifts are just a few steps away and you can return to the hotel on skis thanks to the slope that leads right in front of the hotel. For private ski lessons, we have a collaboration with Sport Elite School. The ski storage is fully equipped and at your disposal.' },
{ title: 'Hiking & excursions', body: 'In summer, Chalet Laura is the ideal starting point for discovering the most evocative trails of the Brenta Dolomites. Guided tours with alpine guides are available, and you can rent MTB and e-bikes directly at the hotel. Ask at reception to organise your excursion.' },
{ title: 'General services & useful info', body: 'The hotel guarantees peace and quiet throughout the property, non-smoking, and without pets for the well-being of allergic guests. Outdoor parking is available, as well as a public garage with a reserved space bookable 50 metres away. For any emergency or need, reception is always at your disposal at +39 0465 441246.' }
],
de: [
{ title: 'Willkommen & Check-in', body: 'Willkommen im Chalet Laura, Ihrem Zuhause im Herzen von Madonna di Campiglio, in den Dolomiten von Brenta, UNESCO-Welterbe. Hier wurde jedes Detail für Ihre Erholung gestaltet: altes Holz, Laaser Marmor, Granit – eine verfeinerte Atmosphäre, die nach echter Bergluft duftet. Der Check-in findet an der Rezeption statt, wo unser Team für alle Ihre Bedürfnisse zur Verfügung steht. Folgen Sie uns mit dem Hashtag #likeathome.' },
{ title: 'Ihr Zimmer', body: 'Ihr Zimmer ist im Chalet-Bergstil mit einem Hauch von Design eingerichtet. Sie finden ein ‘Pure Alpine’ Courtesy-Set mit Berginspiration, weiche Bademäntel und bequeme Hausschuhe. Das WLAN ist im gesamten Haus kostenlos verfügbar. Für alle Zimmerwünsche wenden Sie sich bitte an die Rezeption unter der auf dem Telefon angegebenen Nummer.' },
{ title: 'Frühstück & Restaurant', body: 'Das Frühstück ist ein reichhaltiges Buffet mit à la carte Menü, das jeden Morgen serviert wird. Zum Abendessen bietet unser Restaurant eine Gourmetküche mit Qualität und Nachhaltigkeit, denn ein perfekter Urlaub geht auch durch den Gaumen. Es steht auch eine Lounge-Bar für Ihre Entspannungsmomente zur Verfügung.' },
{ title: 'SPA & Wellness (+16)', body: 'Unser SPA, reserviert für Erwachsene, ist eine Oase des Friedens für Geist und Körper: großer Whirlpool, Dampfbad, Sauna, Biosauna, Erlebnisdusche und Ruhebereich. Es steht auch ein kleiner Fitnessbereich mit Technogym sowie personalisierte Massagen auf Anfrage zur Verfügung. Wir empfehlen, an der Rezeption zu reservieren.' },
{ title: 'Skipisten & Lifte', body: 'Wir befinden uns im Belvedere-Bereich, im Herzen von Madonna di Campiglio: Die Liftanlagen sind nur wenige Schritte entfernt und Sie können mit Skiern bis vor das Hotel zurückkehren, dank der Piste direkt vor dem Hotel. Für Privatskistunden arbeiten wir mit der Sport Elite School zusammen. Der Skiverleih ist vollständig ausgestattet und steht Ihnen zur Verfügung.' },
{ title: 'Wandern & Ausflüge', body: 'Im Sommer ist Chalet Laura der ideale Ausgangspunkt, um die schönsten Wanderwege der Dolomiten von Brenta zu entdecken. Es sind geführte Touren mit Bergführern verfügbar, und Sie können direkt im Hotel MTB und E-Bikes mieten. Wenden Sie sich an die Rezeption, um Ihren Ausflug zu organisieren.' },
{ title: 'Allgemeine Dienste & nützliche Infos', body: 'Das Hotel garantiert Ruhe und Stille in der gesamten Anlage, Nichtraucher, und ohne Haustiere für das Wohlbefinden allergischer Gäste. Der Außenparkplatz steht zur Verfügung, sowie eine öffentliche Garage mit reserviertem Platz, buchbar 50 Meter entfernt. Für alle Notfälle oder Bedürfnisse steht die Rezeption jederzeit unter der Nummer +39 0465 441246 zur Verfügung.' }
],
pl: [
{ title: 'Witamy & Check-in', body: 'Witamy w Chalet Laura, Waszym domu w samym sercu Madonna di Campiglio, w Dolomitach Brenty, wpisanych na listę dziedzictwa UNESCO. Każdy detal został tu przemyślany z myślą o Waszym wypoczynku: stare drewno, marmur z Lasa, granit – wyrafinowana atmosfera przesiąknięta zapachem prawdziwych gór. Check-in odbywa się w recepcji, gdzie nasz personel jest do Waszej dyspozycji w każdej potrzebie. Śledżcie nas z hashtagiem #likeathome.' },
{ title: 'Wasz pokój', body: 'Wasz pokój urządzony jest w stylu górskiego chalet z nutą designu. Znajdziecie zestaw kosmetyczny ‘Pure Alpine’ inspirowany górami, miękkie szlafroki i wygodne kapcie. Wi-Fi jest bezpłatne w całym obiekcie. W przypadku jakichkolwiek potrzeb w pokoju prosimy kontaktować się z recepją pod numer wewnętrzny podany na telefonie.' },
{ title: 'Śniadanie & Restauracja', body: 'Śniadanie to bogaty bufet z menu à la carte, podawany każdego ranka. Na kolację nasza restauracja oferuje kuchnię gourmet łączącą jakość ze zrównoważonym podejściem, bo doskonałe wakacje przechodzą też przez podniebienie. Do dyspozycji jest również lounge bar na chwile relaksu.' },
{ title: 'SPA & Wellness (+16)', body: 'Nasze SPA, zarezerwowane dla dorosłych, to oaza spokoju dla ciała i umysłu: duże jacuzzi, łaźnia parowa, sauna, biosauna, prysznic doświadczeń i strefa relaksu. Do dyspozycji jest również mała siłownia z Technogym oraz spersonalizowane masaże na życzenie. Zalecamy rezerwację w recepcji.' },
{ title: 'Trasy narciarskie & wyciągi', body: 'Znajdujemy się w strefie Belvedere, w samym sercu Madonna di Campiglio: wyciągi są o kilka kroków stąd i można wrócić do hotelu na nartach dzięki trasie prowadzącej wprost przed hotel. W zakresie prywatnych lekcji narciarskich współpracujemy ze Sport Elite School. Przechowalnia nart jest w pełni wyposażona i do Waszej dyspozycji.' },
{ title: 'Szlaki & wycieczki', body: 'Latem Chalet Laura jest idealnym punktem startowym do odkrywania najpiękniejszych szlaków Dolomitów Brenty. Dostępne są wycieczki z przewodnikami górskimi, a rowery MTB i e-bike można wypożyczyć bezpośrednio w hotelu. Zapytajcie w recepcji, aby zorganizować Waszą wycieczkę.' },
{ title: 'Ogólne usługi & przydatne informacje', body: 'Hotel gwarantuje spokój i ciszę w całym obiekcie, jest dla niepalących i bez zwierząt domowych, dla dobrostanu gości uczulonych. Dostępny jest parking zewnętrzny oraz publiczny garaż z zarezerwowanym miejscem do rezerwacji, oddalony o 50 metrów. W przypadku nagłych sytuacji lub potrzeb recepcja jest zawsze do Waszej dyspozycji pod numerem +39 0465 441246.' }
]
};

let currentLang = 'it';

function setLang(lang) {
currentLang = lang;
document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
document.getElementById('btn-' + lang).classList.add('active');
renderCards();
}

function renderCards() {
const sections = DATA[currentLang];
const container = document.getElementById('main-content');
container.innerHTML = sections.map((s, i) => `
<div class="card" id="card-${i}">
<div class="card-header" onclick="toggleCard(${i})">
<span class="dot"></span>
<span class="title">${s.title}</span>
<span class="icon">&#9660;</span>
</div>
<div class="card-body">
<p>${s.body}</p>
${AUDIO[currentLang] ? `<button class="audio-btn" onclick="event.stopPropagation(); playAudio('${currentLang}')">&#128266; Ascolta</button>` : ''}
</div>
</div>
`).join('');
}

function toggleCard(i) {
const card = document.getElementById('card-' + i);
card.classList.toggle('open');
}

renderCards();
</script>
</body>
</html>
